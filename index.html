<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1fsi | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary: #7C3AED;
  --accent: #06B6D4;
  --bg: #080808;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.12);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:
    radial-gradient(circle at 20% 30%, #1e0a3c 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #0a2540 0%, transparent 40%),
    var(--bg);
  color:white;
  overflow-x:hidden;
}

#loader{
  position:fixed;
  inset:0;
  background:#080808;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:.5s;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px 15px 50px;
}

.hero{text-align:center;margin-bottom:25px;}

.avatar{
  width:120px;height:120px;border-radius:50%;
  border:3px solid var(--primary);
}

h1{font-size:2.6rem;margin-top:10px;}
.tagline{color:#aaa;font-size:.9rem;}

/* PROMO */
.promo-box{
  background:linear-gradient(145deg,#12071f,#0a0a0a);
  border:1px solid rgba(124,58,237,0.4);
  border-radius:20px;
  padding:25px;
  text-align:center;
  margin-bottom:25px;
}

.promo-badge{
  background:#ff3b3b;
  padding:6px 14px;
  border-radius:20px;
  font-size:.75rem;
}

.countdown{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.countdown div{
  background:#000;
  border-radius:10px;
  padding:10px;
}

/* SKILLS */
.skills-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:25px;
}

.skill{
  background:#0f0f0f;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* NAV */
.nav-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.nav-item{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:14px;
  padding:15px;
  text-align:center;
  cursor:pointer;
}

.nav-active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
}

/* CONTENT */
.content-box{
  display:none;
  margin-top:15px;
}
.show{display:block;}
</style>
</head>

<body>

<div id="loader">
<i class="fas fa-circle-notch fa-spin fa-2x"></i>
</div>

<div class="container">

<div class="hero">
<img src="https://i.imgur.com/ohuYhH3.png" class="avatar">
<h1>1fsi</h1>
<p class="tagline">Desarrollador</p>
</div>

<div class="promo-box">
<div class="promo-badge">🚀 DISPONIBLE</div>
<h2>Freelance Abierto</h2>

<div class="countdown">
<div><span id="d">00</span></div>
<div><span id="h">00</span></div>
<div><span id="m">00</span></div>
<div><span id="s">00</span></div>
</div>
</div>

<div class="skills-grid">
<div class="skill">Java</div>
<div class="skill">Bots</div>
<div class="skill">Plugins</div>
<div class="skill">Hosting</div>
<div class="skill">Seguridad</div>
<div class="skill">+</div>
</div>

<div class="nav-grid">
<div class="nav-item nav-active" onclick="showTab('inicio',this)">Inicio</div>
<div class="nav-item" onclick="showTab('info',this)">Info</div>
</div>

<div id="inicio" class="content-box show">
<p>Bienvenido</p>
</div>

<div id="info" class="content-box">
<p>Mis servicios</p>
</div>

</div>

<script>
function showTab(id,btn){
document.querySelectorAll('.content-box').forEach(b=>b.classList.remove('show'));
document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('nav-active'));
document.getElementById(id).classList.add('show');
btn.classList.add('nav-active');
}

const endDate = new Date();
endDate.setHours(endDate.getHours() + 48);

setInterval(()=>{
const now = new Date();
const diff = endDate - now;

document.getElementById("d").innerText = Math.floor(diff/86400000);
document.getElementById("h").innerText = Math.floor(diff/3600000)%24;
document.getElementById("m").innerText = Math.floor(diff/60000)%60;
document.getElementById("s").innerText = Math.floor(diff/1000)%60;
},1000);

window.onload=()=>{
setTimeout(()=>{
document.getElementById('loader').style.display='none';
},500);
}
</script>

</body>
  </html>
